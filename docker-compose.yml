version: "3"
services:
  mongo:
    image: mongo
    ports:
      - "27018:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/testdb

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend